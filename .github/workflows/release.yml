name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── darwin-aarch64 (Apple Silicon) ──────────────────────────────────────────
  build-darwin-aarch64:
    name: Build · darwin-aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build agent
        run: cargo build --release --target aarch64-apple-darwin
        working-directory: agent

      - name: Rename binary
        run: cp agent/target/aarch64-apple-darwin/release/wicklee-agent wicklee-agent-darwin-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-darwin-aarch64
          path: wicklee-agent-darwin-aarch64

  # ── linux-x86_64 ─────────────────────────────────────────────────────────────
  build-linux-x86_64:
    name: Build · linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build agent
        run: cargo build --release --target x86_64-unknown-linux-gnu
        working-directory: agent

      - name: Rename binary
        run: cp agent/target/x86_64-unknown-linux-gnu/release/wicklee-agent wicklee-agent-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-linux-x86_64
          path: wicklee-agent-linux-x86_64

  # ── linux-aarch64 (Raspberry Pi / Ampere / Graviton) ─────────────────────────
  build-linux-aarch64:
    name: Build · linux-aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build agent (cross)
        run: cross build --release --target aarch64-unknown-linux-gnu
        working-directory: agent

      - name: Rename binary
        run: cp agent/target/aarch64-unknown-linux-gnu/release/wicklee-agent wicklee-agent-linux-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-linux-aarch64
          path: wicklee-agent-linux-aarch64

  # ── windows-x86_64 ───────────────────────────────────────────────────────────
  build-windows-x86_64:
    name: Build · windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build agent
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: agent

      - name: Rename binary
        run: cp agent/target/x86_64-pc-windows-msvc/release/wicklee-agent.exe wicklee-agent-windows-x86_64.exe
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-windows-x86_64.exe
          path: wicklee-agent-windows-x86_64.exe

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-darwin-aarch64
      - build-linux-x86_64
      - build-linux-aarch64
      - build-windows-x86_64
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: wicklee-agent-darwin-aarch64

      - uses: actions/download-artifact@v4
        with:
          name: wicklee-agent-linux-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: wicklee-agent-linux-aarch64

      - uses: actions/download-artifact@v4
        with:
          name: wicklee-agent-windows-x86_64.exe

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Wicklee ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            wicklee-agent-darwin-aarch64
            wicklee-agent-linux-x86_64
            wicklee-agent-linux-aarch64
            wicklee-agent-windows-x86_64.exe
