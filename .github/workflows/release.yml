name: Release

# Runs on every push to main, producing a rolling "nightly" release.
# Also available via manual dispatch for ad-hoc builds.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS Apple Silicon ───────────────────────────────────────────────────────
  build-macos:
    name: Build · macOS (arm64)
    runs-on: macos-14        # macos-14 = Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build agent
        run: cargo build --release --target aarch64-apple-darwin
        working-directory: agent

      - name: Stage binary
        run: cp agent/target/aarch64-apple-darwin/release/wicklee-agent wicklee-agent-darwin-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-darwin-aarch64
          path: wicklee-agent-darwin-aarch64

  # ── Windows x64 ───────────────────────────────────────────────────────────────
  build-windows:
    name: Build · Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # nvml-wrapper links against nvml.lib at compile time (runtime: nvml.dll
      # ships with NVIDIA drivers). The CUDA toolkit provides nvml.lib for CI.
      - name: Install CUDA toolkit (provides nvml.lib)
        uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'
          method: network
          sub-packages: '["nvml_dev"]'

      - name: Build agent
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: agent

      - name: Stage binary
        shell: bash
        run: cp agent/target/x86_64-pc-windows-msvc/release/wicklee-agent.exe wicklee-agent-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-windows-x86_64.exe
          path: wicklee-agent-windows-x86_64.exe

  # ── Linux x64 (musl — fully static, no glibc dependency) ────────────────────
  build-linux-x64:
    name: Build · Linux (x64, musl)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      # musl cannot link or dlopen glibc-based NVIDIA libraries; skip NVML.
      # The binary runs on Ubuntu 18.04–24.04, Debian, Alpine, and any Linux.
      - name: Build agent (musl, no NVML)
        run: cross build --release --target x86_64-unknown-linux-musl
        working-directory: agent
        env:
          RUSTFLAGS: '--cfg no_nvml'

      - name: Stage binary
        run: cp agent/target/x86_64-unknown-linux-musl/release/wicklee-agent wicklee-agent-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-linux-x86_64
          path: wicklee-agent-linux-x86_64

  # ── Linux arm64 (musl — fully static, no glibc dependency) ───────────────────
  build-linux-arm64:
    name: Build · Linux (arm64, musl)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build agent (musl, no NVML)
        run: cross build --release --target aarch64-unknown-linux-musl
        working-directory: agent
        env:
          RUSTFLAGS: '--cfg no_nvml'

      - name: Stage binary
        run: cp agent/target/aarch64-unknown-linux-musl/release/wicklee-agent wicklee-agent-linux-aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: wicklee-agent-linux-aarch64
          path: wicklee-agent-linux-aarch64

  # ── Publish nightly release ───────────────────────────────────────────────────
  release:
    name: Publish Nightly Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux-x64, build-linux-arm64]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            Auto-built from `main` · commit ${{ github.sha }}

            **Install (always gets this build):**
            ```powershell
            # Windows
            irm https://wicklee.dev/install.ps1 | iex
            ```
            ```bash
            # macOS / Linux
            curl -fsSL https://wicklee.dev/install.sh | bash
            ```
          files: |
            wicklee-agent-darwin-aarch64
            wicklee-agent-windows-x86_64.exe
            wicklee-agent-linux-x86_64
            wicklee-agent-linux-aarch64
