# nginx reverse proxy config for the Wicklee frontend Railway service.
#
# Served at wicklee.dev — proxies /api/* to the cloud backend so all
# traffic flows through a single origin (eliminates CORS, hides backend URL).
#
# PORT is injected by Railway at runtime. entrypoint.sh runs
#   envsubst '$PORT' < nginx.conf > /etc/nginx/conf.d/default.conf
# before nginx starts — only $PORT is substituted; all nginx variables
# ($remote_addr, $uri, $scheme, etc.) are left untouched.

server {
    listen       $PORT default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Use Railway's internal DNS for service-to-service communication.
    # Resolver must point to Railway's internal DNS, not public DNS.
    resolver 100.100.100.100 valid=10s ipv6=off;
    set $backend "http://vibrant-fulfillment.railway.internal:8080";

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/x-font-ttf font/woff2;

    # ── SSE stream (/api/fleet/stream) ────────────────────────────────────────
    # Listed BEFORE the generic /api/ block — nginx uses longest-prefix match
    # but explicit locations take precedence, so this is a belt-and-suspenders
    # safety measure.
    #
    # All five SSE-critical directives are required:
    #   proxy_buffering off    — don't accumulate chunks before forwarding
    #   proxy_cache off        — bypass any cache layer
    #   proxy_http_version 1.1 — required for chunked / keep-alive upstream
    #   Connection ''          — clear hop-by-hop header so upstream stays open
    #   proxy_read_timeout 86400s — hold the connection open for 24 h
    location /api/fleet/stream {
        proxy_pass            $backend;
        proxy_set_header      Host             vibrant-fulfillment.railway.internal;
        proxy_set_header      X-Real-IP        $remote_addr;
        proxy_set_header      X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;

        # SSE — must all be set together or the stream will stall / disconnect
        proxy_buffering       off;
        proxy_cache           off;
        proxy_http_version    1.1;
        proxy_set_header      Connection '';
        proxy_read_timeout    86400s;
        chunked_transfer_encoding on;
    }

    # ── All other /api/* → cloud backend ─────────────────────────────────────
    location /api/ {
        proxy_pass            $backend;
        proxy_set_header      Host             vibrant-fulfillment.railway.internal;
        proxy_set_header      X-Real-IP        $remote_addr;
        proxy_set_header      X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── SPA catch-all ─────────────────────────────────────────────────────────
    # Serve static assets when they exist; all other paths → index.html so
    # React Router handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options   nosniff          always;
    add_header X-Frame-Options          SAMEORIGIN       always;
    add_header Referrer-Policy          strict-origin-when-cross-origin always;
}
