    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #030712;
        color: #f9fafb;
      }
::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #111827; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #4b5563; }

      /* Blog post prose */
      .blog-content { color: #d1d5db; line-height: 1.8; }
      .blog-content h1, .blog-content h2, .blog-content h3,
      .blog-content h4, .blog-content h5, .blog-content h6 {
        color: #f9fafb; font-weight: 700; margin-top: 2em; margin-bottom: 0.6em; line-height: 1.3;
      }
      .blog-content h2 { font-size: 1.5rem; }
      .blog-content h3 { font-size: 1.25rem; }
      .blog-content p { margin-bottom: 1.25em; }
      .blog-content a { color: #60a5fa; text-decoration: underline; text-underline-offset: 3px; }
      .blog-content a:hover { color: #93c5fd; }
      .blog-content strong { color: #f9fafb; font-weight: 600; }
      .blog-content em { font-style: italic; }
      .blog-content code {
        background: #1f2937; color: #e5e7eb; padding: 0.15em 0.45em;
        border-radius: 4px; font-size: 0.875em; font-family: 'JetBrains Mono', monospace;
      }
      .blog-content pre {
        background: #111827; border: 1px solid #1f2937; border-radius: 12px;
        padding: 1.25rem 1.5rem; overflow-x: auto; margin-bottom: 1.5em;
      }
      .blog-content pre code {
        background: none; padding: 0; border-radius: 0; font-size: 0.875rem;
      }
      .blog-content blockquote {
        border-left: 3px solid #3b82f6; padding-left: 1.25rem;
        color: #9ca3af; margin: 1.5em 0; font-style: italic;
      }
      .blog-content ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1.25em; }
      .blog-content ol { list-style: decimal; padding-left: 1.5rem; margin-bottom: 1.25em; }
      .blog-content li { margin-bottom: 0.4em; }
      .blog-content hr { border: none; border-top: 1px solid #1f2937; margin: 2em 0; }
      .blog-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; font-size: 0.9rem; }
      .blog-content th {
        background: #1f2937; color: #f9fafb; font-weight: 600;
        padding: 0.6rem 1rem; text-align: left; border-bottom: 1px solid #374151;
      }
      .blog-content td { padding: 0.6rem 1rem; border-bottom: 1px solid #1f2937; }
      .blog-content tr:last-child td { border-bottom: none; }
    </style>
</head>
