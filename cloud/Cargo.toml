[package]
name    = "wicklee-cloud"
version = "0.1.0"
edition = "2024"

[dependencies]
axum       = "0.7"
tokio      = { version = "1", features = ["full"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower-http = { version = "0.5", features = ["cors"] }
bcrypt     = "0.15"
uuid       = { version = "1", features = ["v4"] }
rusqlite       = { version = "0.31", features = ["bundled"] }
tokio-stream   = "0.1"
futures-util   = "0.3"
jsonwebtoken   = "9"
ureq           = { version = "2", features = ["json"] }
# Constant-time byte comparison for telemetry token auth (C1).
# Prevents timing-side-channel attacks: an attacker probing byte-by-byte matches
# cannot use response latency to reconstruct the expected secret.
subtle         = "2.6"

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
strip         = true
