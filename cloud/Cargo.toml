[package]
name    = "wicklee-cloud"
version = "0.1.0"
edition = "2024"

[dependencies]
axum       = "0.7"
tokio      = { version = "1", features = ["full"] }
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower-http = { version = "0.5", features = ["cors"] }
bcrypt     = "0.15"
uuid       = { version = "1", features = ["v4"] }

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
strip         = true
